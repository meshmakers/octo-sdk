parameters:
  - name: DllFilename
    type: string
  - name: DllPath
    type: string

steps:
  - task: PowerShell@2
    displayName: 'Install xmldocmd'
    inputs:
      targetType: 'inline'
      script: |
        cd "$(Build.SourcesDirectory)"
        $filteredResult = dotnet tool list | Where-Object { $_ -like '*xmldocmd*' }
  
        if ($filteredResult) {
          Write-Host "xmldocmd already installed"
        }
        else {
          dotnet new tool-manifest 
          dotnet tool install xmldocmd 
        }    
  - task: PowerShell@2
    displayName: 'create documentation ${{ parameters.DllFilename }}'
    inputs:
      targetType: 'inline'
      script: |
        $output = "$(build.artifactstagingdirectory)/documentation"
        $path = "${{ parameters.DllPath }}/${{ parameters.DllFilename }}"
        Write-Host "Creating documentation for $path, doc is generated at $output"
        dotnet xmldocmd $path $output 

        
