steps:
  - task: DotNetCoreCLI@2
    displayName: 'Install xmldocmd as a dotnet tool'
    inputs:
      command: custom
      custom: tool
      arguments: 'install --global xmldocmd'
  - task: PowerShell@2
    inputs:
      targetType: 'inline'
      script: |
        $output = "$(build.artifactstagingdirectory)/documentation"
        $path = "$(Build.SourcesDirectory)/bin/$(BuildConfiguration)/Shared/Frontend/Meshmakers.Octo.Frontend.Client.dll"
        xmldocmd $path test
    displayName: 'create documentation'

        
