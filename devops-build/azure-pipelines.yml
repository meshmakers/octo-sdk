name: $(MajorVersion).$(MinorVersion).$(date:yyMM).$(DayOfMonth)$(rev:rrr)-$(Build.SourceBranchName)

resources:
  pipelines:
    - pipeline: octo-construction-kit-engine
      source: octo-construction-kit-engine-CI
      trigger:
        branches:
          include:
            - main
    - pipeline: octo-distributedEventHub
      source: octo-distributedEventHub-CI
      trigger:
        branches:
          include:
            - main
  repositories:
    # Needed for the publish-helm-chart.yml template that uploads the
    # octo-plug-simulation chart to the meshmakers/octo-helm gh-pages
    # repo via the chart-releaser pattern.
    - repository: helmChartBuild
      type: github
      name: meshmakers/helm-chart-build
      endpoint: meshmakers-access-token
      ref: refs/heads/main

trigger:
  batch: true
  branches:
    include:
      - dev/*
      - test/*
      - main
  tags:
    exclude:
      - '*'
      
variables:
  - group: ApiKeys-mm-cloud
  - group: OctoDefault
  - name: solutionFile
    value: 'Octo.Sdk.sln'
  - name: artifactsFrameworkVersion
    value: 'net10.0'
  - name: buildConfiguration
    value: 'Release'
  - name: buildPlatform
    value: 'Any CPU'
  - name: isRelease
    value: ${{ startsWith(variables['Build.SourceBranch'], 'refs/tags/r') }}
  - name: isMain
    value: ${{ eq(variables['Build.SourceBranch'], 'refs/heads/main') }}
  - name: isTest
    value: ${{ startsWith(variables['Build.SourceBranch'], 'refs/heads/test') }}

stages:
 - stage: Build
   jobs:
    - job: buildsdk
      displayName: "Build nuget and execute tests"
      pool:
        name: meshmakers-ci-agents
      steps:
      - template: update-build-number.yml
      - checkout: self
        clean: true
      - template: set-version.yml
      - template: download-ca.yml
      - task: DotNetCoreCLI@2
        displayName: 'Restore NuGet packages'
        inputs:
          command: 'restore'
          projects: '$(SolutionFile)'
          restoreArguments: '--force /p:OctoNugetPrivateServer=$(nugetPrivateServer)'
          noCache: true
      - task: DotNetCoreCLI@2
        displayName: 'Build'
        inputs:
          command: 'build'
          projects:  $(SolutionFile)
          arguments: '--no-restore --configuration $(BuildConfiguration) /p:OctoNugetPrivateServer=$(nugetPrivateServer) /p:OctoPrivateGitHubApiKey=$(GitHubPAT) /p:OctoPublicGitHubApiKey=$(GitHubPAT)'
          publishWebProjects: false
          zipAfterPublish: false
          modifyOutputPath: false
      - task: DotNetCoreCLI@2
        displayName: 'Test'
        inputs:
          command: 'test'
          arguments: '--configuration $(buildConfiguration) /p:OctoNugetPrivateServer=$(nugetPrivateServer)'
          projects: |
            **/*Tests.csproj
            !**/*SystemTests.csproj
          testRunTitle: 'CI'
      - template: build-and-push-docker-image.yml
        parameters:
          PublicRegistryServiceConnection: $(DockerRegistryPublicConnection)
          PrivateRegistryName: $(DockerRegistryPrivateUri)
          Repository: meshmakers/octo-communication-adapter-simulation
          Dockerfile: src/Sdk.Plug.Simulation/Dockerfile
          Architecture: 'linux/arm64,linux/amd64'
      # Chart version uses Build.BuildId (Azure-DevOps-wide monotonic) as
      # the patch so each run gets a unique 3-segment SemVer. The publish
      # template refuses to re-publish an existing version, so collisions
      # would fail loudly.
      - task: HelmDeploy@0
        displayName: 'helm package octo-plug-simulation'
        inputs:
          command: package
          chartPath: '$(System.DefaultWorkingDirectory)/src/charts/octo-plug-simulation'
          chartVersion: '$(MajorVersion).$(MinorVersion).$(Build.BuildId)'
          destination: '$(Build.artifactstagingdirectory)'
          arguments: '--app-version $(Build.BuildNumber) --dependency-update'
      # Dev (rolling) publish — every main build lands in
      # helm-chart-build's gh-pages catalog.
      - template: ci-templates/publish-helm-chart.yml@helmChartBuild
        parameters:
          channel: dev
          chartName: octo-plug-simulation
          chartVersion: $(MajorVersion).$(MinorVersion).$(Build.BuildId)
          chartTgzPath: $(Build.artifactstagingdirectory)/octo-plug-simulation-$(MajorVersion).$(MinorVersion).$(Build.BuildId).tgz
          githubTokenVariable: HelmChartBuildGhToken
          condition: and(succeeded(), eq(variables.isMain, true))
      # Release publish — only on r* tag, lands in
      # meshmakers.github.io/charts/ next to the platform charts.
      - template: ci-templates/publish-helm-chart.yml@helmChartBuild
        parameters:
          channel: release
          chartCategory: adapter
          chartName: octo-plug-simulation
          chartVersion: $(MajorVersion).$(MinorVersion).$(Build.BuildId)
          chartTgzPath: $(Build.artifactstagingdirectory)/octo-plug-simulation-$(MajorVersion).$(MinorVersion).$(Build.BuildId).tgz
          githubTokenVariable: HelmChartBuildGhToken
          condition: and(succeeded(), eq(variables.isRelease, true))
      - task: PowerShell@2
        inputs:
          filePath: '$(System.DefaultWorkingDirectory)/devops-build/createDocumentation.ps1'
          arguments: '-configuration $(buildConfiguration)'
        displayName: 'Create documentation'
      - template: handle-artifacts.yml
        parameters:
          apiDocumentationPaths:
            - '$(Build.SourcesDirectory)/bin/$(buildConfiguration)/documentation'          
      - template: push-nuget-package.yml           

