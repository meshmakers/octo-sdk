# Root-level CI pipeline using shared templates from octo-pipeline-templates.
#
# Phase 1 pilot 3 of the YAML migration (see octo-mesh-deployment's
# docs/pipeline-architecture-concept.md). After DEH (#10/#11, simple lib) and
# CK-Engine (#185 + cleanup, Docker), this one adds:
#
#   • resources.pipelines triggers — SDK CI re-fires when DEH-CI or
#     CK-Engine-CI publishes a fresh build on main, picking up new NuGets.
#   • helm-chart-build templates — packaged chart published to dev catalogue
#     on every main build and to the release catalogue on r* tags.
#   • Multi-arch Docker (linux/arm64,linux/amd64) for octo-communication-
#     adapter-simulation.
#
# devops-build/createDocumentation.ps1 still referenced at its old path —
# a follow-up cleanup PR moves it to scripts/ and deletes the legacy
# devops-build/ folder (same shape as the previous two pilots).

name: $(MajorVersion).$(MinorVersion).$(date:yyMM).$(DayOfMonth)$(rev:rrr)-$(Build.SourceBranchName)

resources:
  pipelines:
    - pipeline: octo-construction-kit-engine
      source: octo-construction-kit-engine-CI
      trigger:
        branches:
          include:
            - main
    - pipeline: octo-distributedEventHub
      source: octo-distributedEventHub-CI
      trigger:
        branches:
          include:
            - main
  repositories:
    - repository: pipelineTemplates
      type: github
      name: meshmakers/octo-pipeline-templates
      endpoint: meshmakers-access-token
      ref: refs/tags/tpl-v0.2.1
    # Needed for the publish-helm-chart.yml template that uploads the
    # octo-plug-simulation chart to the meshmakers/helm-chart-build gh-pages
    # repo via the chart-releaser pattern.
    - repository: helmChartBuild
      type: github
      name: meshmakers/helm-chart-build
      endpoint: meshmakers-access-token
      ref: refs/heads/main

trigger:
  batch: true
  branches:
    include:
      - dev/*
      - test/*
      - main
  tags:
    exclude:
      - '*'

variables:
  - group: ApiKeys-mm-cloud
  - group: OctoDefault
  - name: solutionFile
    value: 'Octo.Sdk.sln'
  - name: artifactsFrameworkVersion
    value: 'net10.0'
  - name: buildConfiguration
    value: 'Release'
  - name: buildPlatform
    value: 'Any CPU'
  - name: isRelease
    value: ${{ startsWith(variables['Build.SourceBranch'], 'refs/tags/r') }}
  - name: isMain
    value: ${{ eq(variables['Build.SourceBranch'], 'refs/heads/main') }}
  - name: isTest
    value: ${{ startsWith(variables['Build.SourceBranch'], 'refs/heads/test') }}

stages:
  - stage: Build
    jobs:
      - job: buildsdk
        displayName: 'Build nuget and execute tests'
        pool:
          name: meshmakers-ci-agents
        steps:
          - template: templates/steps/update-build-number.yml@pipelineTemplates
          # Sets $(ChartVersion) — 3-segment SemVer derived from
          # Build.BuildNumber. See helm-chart-build's docs/PUBLISHING.md.
          - template: ci-templates/derive-chart-version.yml@helmChartBuild
          - checkout: self
            clean: true
          - template: templates/steps/set-version.yml@pipelineTemplates
          - template: templates/steps/download-ca.yml@pipelineTemplates
          - task: DotNetCoreCLI@2
            displayName: 'Restore NuGet packages'
            inputs:
              command: 'restore'
              projects: '$(SolutionFile)'
              restoreArguments: '--force /p:OctoNugetPrivateServer=$(nugetPrivateServer)'
              noCache: true
          - task: DotNetCoreCLI@2
            displayName: 'Build'
            inputs:
              command: 'build'
              projects: $(SolutionFile)
              arguments: '--no-restore --configuration $(BuildConfiguration) /p:OctoNugetPrivateServer=$(nugetPrivateServer) /p:OctoPrivateGitHubApiKey=$(GitHubPAT) /p:OctoPublicGitHubApiKey=$(GitHubPAT)'
              publishWebProjects: false
              zipAfterPublish: false
              modifyOutputPath: false
          - task: DotNetCoreCLI@2
            displayName: 'Test'
            inputs:
              command: 'test'
              arguments: '--configuration $(buildConfiguration) /p:OctoNugetPrivateServer=$(nugetPrivateServer)'
              projects: |
                **/*Tests.csproj
                !**/*SystemTests.csproj
              testRunTitle: 'CI'
          - template: templates/steps/build-and-push-docker.yml@pipelineTemplates
            parameters:
              publicRegistryServiceConnection: $(DockerRegistryPublicConnection)
              privateRegistryName: $(DockerRegistryPrivateUri)
              repository: meshmakers/octo-communication-adapter-simulation
              dockerfile: src/Sdk.Plug.Simulation/Dockerfile
              platforms: 'linux/arm64,linux/amd64'
          # Chart version is $(ChartVersion) — derived by derive-chart-version.yml
          # from Build.BuildNumber. On main: 0.1.<yyMM><DDxxx> (e.g. 0.1.260518002);
          # on r-tags: <Major>.<Minor>.<Patch>. Strict 3-segment SemVer for Helm.
          - task: HelmDeploy@0
            displayName: 'helm package octo-plug-simulation'
            inputs:
              command: package
              chartPath: '$(System.DefaultWorkingDirectory)/src/charts/octo-plug-simulation'
              chartVersion: '$(ChartVersion)'
              destination: '$(Build.artifactstagingdirectory)'
              arguments: '--app-version $(Build.BuildNumber) --dependency-update'
          # Dev (rolling) publish — every main build lands in
          # helm-chart-build's gh-pages catalog.
          - template: ci-templates/publish-helm-chart.yml@helmChartBuild
            parameters:
              channel: dev
              chartName: octo-plug-simulation
              chartVersion: $(ChartVersion)
              chartTgzPath: $(Build.artifactstagingdirectory)/octo-plug-simulation-$(ChartVersion).tgz
              githubTokenVariable: HelmChartBuildGhToken
              condition: and(succeeded(), eq(variables.isMain, true))
          # Release publish — only on r* tag, lands in
          # meshmakers.github.io/charts/ next to the platform charts.
          - template: ci-templates/publish-helm-chart.yml@helmChartBuild
            parameters:
              channel: release
              chartCategory: adapter
              chartName: octo-plug-simulation
              chartVersion: $(ChartVersion)
              chartTgzPath: $(Build.artifactstagingdirectory)/octo-plug-simulation-$(ChartVersion).tgz
              githubTokenVariable: HelmChartBuildGhToken
              condition: and(succeeded(), eq(variables.isRelease, true))
          - task: PowerShell@2
            displayName: 'Create documentation'
            inputs:
              filePath: '$(System.DefaultWorkingDirectory)/devops-build/createDocumentation.ps1'
              arguments: '-configuration $(buildConfiguration)'
          - template: templates/steps/handle-artifacts.yml@pipelineTemplates
            parameters:
              apiDocumentationPaths:
                - '$(Build.SourcesDirectory)/bin/$(buildConfiguration)/documentation'
          - template: templates/steps/push-nuget-package.yml@pipelineTemplates
