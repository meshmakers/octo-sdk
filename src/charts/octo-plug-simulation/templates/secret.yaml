{{- /*
  Chart-owned `<fullname>-backend` Secret. Holds plaintext credentials for
  legacy installs that pass `.Values.secrets.*` as strings. The resource
  is skipped entirely when every secret is sourced externally (operator-
  managed secret, External Secrets, etc.) via a `valueFrom` map — in that
  case `_env.tpl` references those Secrets directly and no chart-owned
  Secret is needed.
*/ -}}
{{- if include "octo-mesh.hasPlaintextBackendSecret" . }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ printf "%s-backend" (include "octo-mesh.fullname" .) }}
  labels:
    {{- include "octo-mesh.labels" . | nindent 4 }}
type: Opaque
data:
{{- if and .Values.secrets.databaseUser (not (kindIs "map" .Values.secrets.databaseUser)) }}
  databaseUser: {{ .Values.secrets.databaseUser | b64enc | quote }}
{{- end }}
{{- if and .Values.secrets.databaseAdmin (not (kindIs "map" .Values.secrets.databaseAdmin)) }}
  databaseAdmin: {{ .Values.secrets.databaseAdmin | b64enc | quote }}
{{- end }}
{{- if and .Values.secrets.streamDataPassword (not (kindIs "map" .Values.secrets.streamDataPassword)) }}
  streamDataPassword: {{ .Values.secrets.streamDataPassword | b64enc | quote }}
{{- end }}
{{- if and .Values.secrets.rabbitmq (not (kindIs "map" .Values.secrets.rabbitmq)) }}
  rabbitmq: {{ .Values.secrets.rabbitmq | b64enc | quote }}
{{- end }}
{{- end }}
---
{{- if .Values.secrets.rootCa }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ printf "%s-ca" (include "octo-mesh.fullname" .) }}
  labels:
    {{- include "octo-mesh.labels" . | nindent 4 }}
type: Opaque
data:
  {{- include "checkMandatoryValue" (dict "name" "secrets.rootCa" "value" .Values.secrets.rootCa) }}
  root-ca.pem: {{ .Values.secrets.rootCa | b64enc | quote }}
{{- end }}